# Parity fixture — TEXT type, 2x2 with negative gap so adjacent
# rectangle outlines share their edge (gap_mm = -0.125 ≈ -1 dot at 8 dpmm).

type = "TEXT"

width_mm = 36.0
height_mm = 30.0
dots_per_mm = 8

count_x = 2
count_y = 2
gap_mm = -0.125

outline_px = 1
circle_diameter_mm = 14.5
text_width_mm = 10.0
text_height_mm = 7.0
printer_port = "COM4"
manual = []

[[lines]]
name = "Top"
font_path = "C:/Windows/Fonts/consolab.ttf"
size_px = 14
bold = false
italic = false
underline = false
underline_offset_px = 0
offset_x_px = 0
offset_y_px = -8
default_text = ""

[[lines]]
name = "Bottom"
font_path = "C:/Windows/Fonts/Candarab.ttf"
size_px = 10
bold = false
italic = false
underline = false
underline_offset_px = 0
offset_x_px = 0
offset_y_px = 10
default_text = ""
