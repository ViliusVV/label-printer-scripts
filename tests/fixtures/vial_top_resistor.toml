# Parity fixture — copy of data/vial_top_resistor.toml.
# Exercises VIAL_TOP, 2-cell row, three lines with non-empty default_text
# (so CSV cells with blank line_2/line_3 hit the default-text fallback).

type = "VIAL_TOP"

width_mm = 36.0
height_mm = 30.0
